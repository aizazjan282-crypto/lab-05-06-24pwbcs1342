<!-- Task 11: Responsive CSS Grid Magazine Layout -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 11: Responsive CSS Grid Magazine</title>
    <link rel="stylesheet" href="../styles/grid.css">
</head>
<body>
    <header class="mag-header">
        <h1>Magazine Grid Layout</h1>
    </header>

    <main class="magazine-grid">
        <article class="featured">
            <h2>Featured Article</h2>
            <img src="../images/gallery/img1.jpg" alt="Featured">
            <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
        </article>
        <article class="story">
            <h2>Story 1</h2>
            <img src="../images/gallery/img2.jpg" alt="Story 1">
            <p>Short story content here.</p>
        </article>
        <article class="story">
            <h2>Story 2</h2>
            <img src="../images/gallery/img3.jpg" alt="Story 2">
            <p>Another story content here.</p>
        </article>
        <article class="story">
            <h2>Story 3</h2>
            <img src="../images/gallery/img4.jpg" alt="Story 3">
            <p>More story content here.</p>
        </article>
        <article class="sidebar">
            <h2>Sidebar</h2>
            <p>Additional news, ads, or links go here.</p>
        </article>
    </main>
</body>
</html>
