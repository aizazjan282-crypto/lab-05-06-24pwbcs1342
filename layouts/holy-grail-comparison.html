<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 7: Holy Grail Layout</title>
    <link rel="stylesheet" href="../styles/float.css">
    <link rel="stylesheet" href="../styles/flexbox.css">
    <link rel="stylesheet" href="../styles/grid.css">
</head>
<body>
    <header class="header">Header</header>

    <div class="container-float">
        <aside class="sidebar left">Left Sidebar (Float)</aside>
        <main class="content">Main Content (Float)</main>
        <aside class="sidebar right">Right Sidebar (Float)</aside>
    </div>

    <div class="container-flex">
        <aside class="sidebar left">Left Sidebar (Flexbox)</aside>
        <main class="content">Main Content (Flexbox)</main>
        <aside class="sidebar right">Right Sidebar (Flexbox)</aside>
    </div>

    <div class="container-grid">
        <aside class="sidebar left">Left Sidebar (Grid)</aside>
        <main class="content">Main Content (Grid)</main>
        <aside class="sidebar right">Right Sidebar (Grid)</aside>
    </div>
</body>
</html>
