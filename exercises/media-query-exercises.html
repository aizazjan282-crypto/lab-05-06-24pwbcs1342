<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Data Table</title>
<link rel="stylesheet" href="../styles/responsive.css">
</head>
<body>

<div class="table-container">
<h1>Employee Data</h1>

<table class="responsive-table">

<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Position</th>
<th>Department</th>
<th>Salary</th>
</tr>
</thead>

<tbody>

<tr>
<td data-label="ID">1</td>
<td data-label="Name">Ali Ahmad</td>
<td data-label="Position">Developer</td>
<td data-label="Department">IT</td>
<td data-label="Salary">$5000</td>
</tr>

<tr>
<td data-label="ID">2</td>
<td data-label="Name">Aizaz Jan</td>
<td data-label="Position">Designer</td>
<td data-label="Department">Creative</td>
<td data-label="Salary">$4500</td>
</tr>

<tr>
<td data-label="ID">3</td>
<td data-label="Name">Sara Khan</td>
<td data-label="Position">Manager</td>
<td data-label="Department">Operations</td>
<td data-label="Salary">$6000</td>
</tr>

<tr>
<td data-label="ID">4</td>
<td data-label="Name">Usman Ali</td>
<td data-label="Position">Analyst</td>
<td data-label="Department">Finance</td>
<td data-label="Salary">$4800</td>
</tr>

</tbody>

</table>

</div>

</body>
</html>
